name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    # the job should only run when a webhook URL has been configured in secrets
    if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run typecheck
        run: npm run type-check

      - name: Build app
        run: npm run build

      - name: Trigger deployment webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          curl --fail-with-body --show-error --silent \
            --request POST \
            --header "Content-Type: application/json" \
            --data "{\"ref\":\"${{ github.ref_name }}\",\"sha\":\"${{ github.sha }}\"}" \
            "$DEPLOY_WEBHOOK_URL"

  deploy-not-configured:
    name: Deployment Not Configured
    runs-on: ubuntu-latest
    if: ${{ secrets.DEPLOY_WEBHOOK_URL == '' }}
    steps:
      - name: Explain skipped deploy
        run: |
          echo "DEPLOY_WEBHOOK_URL secret is not configured."
          echo "CD deploy step was skipped."
