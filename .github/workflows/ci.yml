name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ... (code_quality_checks job remains the same) ...
  code_quality_checks:
    name: Code Quality Checks (Format, Lint, Type)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm install

      - name: Run Formatting Check
        run: npm run format:check

      - name: Run Linting Check
        run: npm run lint

      - name: Run Type Check (Lint-Type)
        run: npm run type-check
  build:
    needs: [code_quality_checks]
    runs-on: ubuntu-latest

    # 🌟 NEW: Define the DATABASE_URL environment variable here
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      # The DATABASE_URL is now automatically available to these steps via the 'env' block
      - name: Build
        run: npm run build

      - name: Prisma Migrate
        run: npx prisma migrate dev --preview-feature

      - name: Prisma Generate
        run: npx prisma generate
